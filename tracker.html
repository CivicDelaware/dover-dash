yee, this law (passed over the governor's veto) makes the general contractor on a project jointly responsible for a subcontractor's wage and classification violations \u2014 so you have a better shot at recovering back wages, tax withholding, and workers' comp you were owed.","s":"Chapter 35 of Title 19 prohibits an employer from improperly classifying an individual who is an employee as an independent contractor. Not only is this improper classification unfair to employees because it violates state and federal laws related to income tax withholding, unemployment insurance, wage laws, and workers' compensation, it is also unfair to contractors who comply with Chapter 35 and these other employment laws. When employers who violate Chapter 35 are subcontractors who have not registered as contractors as required under Chapter 36 of Title 19, the Department of Labor (Department) has no recourse for enforcing compliance with Chapter 35. This Act makes a general contractor responsible for a subcontractor's compliance with Chapter 35 by making the general contractor jointly and severally liable for restitution and penalties assessed against the subcontractor. This Act also allows the Department to deny, suspend, or revoke the certificate of registration of a contractor who contracts with a subcontractor who has not registered on any project. In addition, Section 3 of this Act makes technical corrections to conform existing law to the standards of the Delaware Legislative Drafting Manual.","d":{"workpro":"Helps You","lowwage":"Helps You","smallbiz":"Watch Out"},"u":"https://legis.delaware.gov/Legislation?SearchText=SB+63"},{"n":"SB 75 w/ SA 1, SA 2","b":"SB 75","p":"Counties in Delaware can no longer block or over-restrict licensed marijuana stores and cultivation facilities through local ordinances \u2014 if your cannabis business meets state licensing and zoning rules, counties must allow you to operate with standard hours and cannot deny your building permits.","s":"This Act limits the restrictions a county may impose on the operation of marijuana establishments, including: requiring that a medical marijuana compassion center granted a conversion license for a retail marijuana store be allowed to operate as a nonconforming use; prohibiting denial of a building permit if improvements comply with physical zoning requirements; requiring counties to allow minimum operating hours of 9 a.m.-9 p.m. Monday-Saturday and noon-8 p.m. Sunday; permitting indoor, fully-enclosed cultivation facilities in agricultural/industrial zones; and allowing retail marijuana stores in commercial/industrial zones to be restricted only within \u00bd mile of another store or within 500 feet of a place of worship, school, licensed child care, residential treatment facility, park, or library. These limits preempt and supersede existing and future county ordinances regarding marijuana establishments. This Act also makes corresponding and technical changes to align language regarding municipalities.","d":{"smallbiz":"Watch Out"},"u":"https://legis.delaware.gov/Legislation?SearchText=SB+75"}];

/* ── STATE ── */
var st = {
  screen:   "intro",
  profile:  null,
  filter:   "watchout",
  expanded: {},
  capDone:  {},
  subDone:  false,
};

/* ── DATA HELPERS ── */
function getBillsForProfile(profileKey) {
  return BILL_PROFILES
    .filter(function(b){ return b.d && b.d[profileKey]; })
    .map(function(b){
      return {
        id:        b.b.replace(/[\s\/+]/g,"_"),
        code:      b.b,
        fullCode:  b.n,
        synopsis:  b.p || b.s,
        direction: b.d[profileKey],
        stage:     "passed",
        link:      b.u,
      };
    });
}

function getStats() {
  var wo = 0, hy = 0;
  BILL_PROFILES.forEach(function(b){
    var dirs = Object.keys(b.d).map(function(k){ return b.d[k]; });
    if (dirs.indexOf("Watch Out") !== -1) wo++;
    if (dirs.indexOf("Helps You") !== -1) hy++;
  });
  return {wo:wo, hy:hy, total:BILL_PROFILES.length};
}

function getProfileStats(key) {
  var wo = 0, hy = 0;
  BILL_PROFILES.forEach(function(b){
    if (!b.d[key]) return;
    if (b.d[key] === "Watch Out") wo++; else hy++;
  });
  return {wo:wo, hy:hy};
}

/* ── RENDER ── */
function render() {
  document.getElementById("screen").innerHTML =
    st.screen === "intro" ? renderIntro() : renderForecast();
}

/* INTRO */
function renderIntro() {
  var stats = getStats();

  var heroHtml =
    '<div class="eyebrow">Delaware\'s Legislative Bill Tracker</div>' +
    '<div class="hero-brand">Dover <em>Dash</em></div>' +
    '<div class="hero-subtitle">' + SESSION.assembly + ' &nbsp;·&nbsp; ' + SESSION.years + '</div>' +
    '<div class="session-badge">' +
      '<div class="badge-dot"></div>' +
      '<div class="badge-text">' + SESSION.label + '</div>' +
    '</div>';

  var btns = PROFILES.map(function(p) {
    var sel = st.profile === p.key;
    var ps  = getProfileStats(p.key);
    var statHtml = ps.wo > 0
      ? '<div class="prof-stat has-wo">' + ps.wo + ' Watch Out · ' + ps.hy + ' Helps You</div>'
      : '<div class="prof-stat no-wo">' + ps.hy + ' laws working in your favor</div>';
    return '<button class="prof-btn' + (sel?" sel":"") + '" onclick="pick(\'' + p.key + '\')">' +
      '<span class="prof-em">' + p.em + '</span>' +
      '<div style="flex:1"><div class="prof-label">' + p.label + '</div><div class="prof-sub">' + p.sub + '</div>' + statHtml + '</div>' +
      '<div class="check' + (sel?" on":"") + '">' + (sel?"✓":"") + '</div>' +
    '</button>';
  }).join("");

  var woEx = BILL_PROFILES.filter(function(b){ return Object.keys(b.d).some(function(k){ return b.d[k]==="Watch Out"; }); })[0];
  var hyEx = BILL_PROFILES.filter(function(b){ return Object.keys(b.d).some(function(k){ return b.d[k]==="Helps You"; }); })[0];
  var previewCards = [
    woEx ? {code:woEx.b,direction:"Watch Out", headline:woEx.p.slice(0,88)+"…"} : null,
    hyEx ? {code:hyEx.b,direction:"Helps You", headline:hyEx.p.slice(0,88)+"…"} : null,
  ].filter(Boolean).map(function(b){
    var cls     = b.direction==="Watch Out" ? "watch" : "helps";
    var bdgCls  = b.direction==="Watch Out" ? "mc-bw"  : "mc-bh";
    return '<div class="mini-card ' + cls + '">' +
      '<div class="mc-top"><span class="mc-code">' + esc(b.code) + '</span><span class="' + bdgCls + '">' + b.direction + '</span></div>' +
      '<div class="mc-hl">' + esc(b.headline) + '</div>' +
    '</div>';
  }).join("");

  var unlockTxt = st.profile ? "🔓 Unlock my bills →" : "Select a profile to unlock";
  var ctaDis    = st.profile ? "" : "disabled";
  var ctaTxt    = st.profile ? "Submit →" : "Select a profile above";

  return '<div class="hero-card"><div class="hero-dark">' + heroHtml + '</div></div>' +
    '<div class="hero-white">' +
      '<div class="sect-lbl">Pick your profile:</div>' +
      btns +
      '<div class="preview-wrap">' +
        '<div class="preview-lbl">Bills tracked this session:</div>' +
        '<div class="preview-rel">' +
          '<div class="preview-cards">' + previewCards + '</div>' +
          '<div class="preview-overlay">' +
            '<button class="unlock-btn' + (st.profile?" pulsing":"") + '" onclick="goForecast()">' + unlockTxt + '</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button class="cta-btn" ' + ctaDis + ' onclick="goForecast()">' + ctaTxt + '</button>' +
    '</div>' +
    renderFoot();
}

/* FORECAST */
function renderForecast() {
  var p = PROFILES.filter(function(x){ return x.key===st.profile; })[0];
  var myBills = getBillsForProfile(st.profile);

  var filtered = myBills.filter(function(b){
    if (st.filter==="watchout") return b.direction==="Watch Out";
    if (st.filter==="helps")    return b.direction==="Helps You";
    return true;
  });

  var tabs = [
    {key:"watchout",label:"Watch Out",css:"wo"},
    {key:"helps",   label:"Helps You",css:"hy"},
    {key:"all",     label:"All Bills", css:"all"},
  ].map(function(t){
    return '<button class="ftab ' + t.css + (st.filter===t.key?" on":"") + '" onclick="setFilter(\'' + t.key + '\')">' + t.label + '</button>';
  }).join("");

  var cards;
  if (!filtered.length && st.filter==="watchout") {
    cards = '<div class="empty-wo">' +
      '<div style="font-size:16px;margin-bottom:6px;">✅</div>' +
      '<div style="font-size:13px;font-weight:700;color:#1A7A4A;">No Watch Out bills for your profile this session.</div>' +
      '<div style="font-size:11px;color:#6B7280;margin-top:4px;">The 153rd GA\'s legislation actually worked in your favor.</div>' +
      '<button class="switch-btn" onclick="setFilter(\'helps\')">See bills that help you →</button>' +
    '</div>';
  } else if (!filtered.length) {
    cards = '<div class="loading-msg" style="font-style:italic;">No bills match this filter.</div>';
  } else {
    var capInserted = false;
    cards = filtered.map(function(b) {
      var borderColor = b.direction==="Helps You" ? "#1A7A4A"
                      : b.direction==="Watch Out"  ? "#D93B3B" : "#D1D5DB";
      var badgeCls    = b.direction==="Helps You" ? "badge badge-h"
                      : b.direction==="Watch Out"  ? "badge badge-w" : "badge badge-n";
      var stageCss    = STAGE_CSS[b.stage] || "sp-passed";
      var stageLabel  = STAGE_LABELS[b.stage] || "Enacted";
      var exp         = st.expanded[b.id];
      var showAmend   = b.fullCode !== b.code;

      var card = '<div class="bill-card" style="border-left:4px solid ' + borderColor + '">' +
        '<div class="bc-inner">' +
          '<div class="bc-top">' +
            '<div>' +
              '<div class="bc-code">' + esc(b.code) + '</div>' +
              (showAmend ? '<div style="font-size:9px;color:#9CA3AF;margin-top:1px;line-height:1.3;">' + esc(b.fullCode) + '</div>' : '') +
            '</div>' +
            '<span class="' + badgeCls + '">' + (b.direction||"Monitoring") + '</span>' +
          '</div>' +
          '<span class="stage-pill ' + stageCss + '" style="margin-bottom:2px;display:inline-flex;">' + stageLabel + '</span>' +
        '</div>' +
        (exp
          ? '<div class="bc-expanded">' +
              '<div class="bc-sec-lbl">What this means for you</div>' +
              '<div class="bc-sum">' + esc(b.synopsis) + '</div>' +
              '<a href="' + b.link + '" target="_blank" rel="noopener" class="bc-link">Find on legis.delaware.gov →</a>' +
            '</div>' +
            '<button class="exp-btn" onclick="toggle(\'' + b.id + '\')">Collapse ▲</button>'
          : '<button class="exp-btn" onclick="toggle(\'' + b.id + '\')">Tap to read what this means ▼</button>') +
      '</div>';

      var cap = "";
      if (b.direction==="Watch Out" && !capInserted) {
        capInserted = true;
        cap = st.capDone[b.id]
          ? '<div class="inline-cap"><div class="ic-success">✅ You\'re on the list! We\'ll alert you when new bills move.</div></div>'
          : '<div class="inline-cap">' +
              '<div class="ic-hl">🚨 Bills like this will move again next session.</div>' +
              '<div class="ic-sub">Get an early alert when new legislation affects your profile.</div>' +
              '<div class="ic-row">' +
                '<input class="ic-inp" id="ic-email-' + b.id + '" type="email" placeholder="your@email.com">' +
                '<button class="ic-btn" onclick="doInlineSub(\'' + b.id + '\')">Alert me</button>' +
              '</div>' +
            '</div>';
      }
      return card + cap;
    }).join("");
  }

  var billWord = myBills.length === 1 ? "bill" : "bills";
  var ps = getProfileStats(st.profile);
  return '<div class="prof-hdr">' +
      '<div style="text-align:left;">' +
        '<button class="back-btn" onclick="goIntro()">← All Profiles</button>' +
      '</div>' +
      '<span class="prof-em-big">' + (p?p.em:"") + '</span>' +
      '<div class="prof-name">' + (p?esc(p.label):"") + '</div>' +
      '<div class="prof-hdr-sub">' + (p?esc(p.sub):"") + '</div>' +
      '<div class="impact-row">' +
        (ps.wo > 0 ? '<span class="impact-chip wo">⚠ ' + ps.wo + ' Watch Out</span>' : '') +
        '<span class="impact-chip hy">✓ ' + ps.hy + ' Help' + (ps.hy!==1?'s':' ') + ' You</span>' +
      '</div>' +
      (SPONSORS[st.profile]
        ? '<div class="sponsor-line">Supported by <a href="' + esc(SPONSORS[st.profile].url) + '" target="_blank" rel="noopener sponsored">' + esc(SPONSORS[st.profile].name) + '</a></div>'
        : '') +
    '</div>' +
    '<div class="filter-tabs">' + tabs + '</div>' +
    '<div class="bill-list">' +
      cards +
      '<a href="' + LEGIS_BASE + '/Legislation" target="_blank" rel="noopener" class="agenda-bar">' +
        '<span style="font-size:14px;">📋</span><span>View All Legislation on legis.delaware.gov →</span>' +
      '</a>' +
    '</div>' +
    renderFoot();
}

function renderFoot() {
  return '<div class="foot">' +
    '<div class="foot-line">Source: <a href="' + LEGIS_BASE + '" target="_blank" rel="noopener">Delaware General Assembly</a></div>' +
    '<div class="foot-line">Bills shown were passed by the 153rd General Assembly</div>' +
    '<div class="foot-line" style="margin-top:6px;">Dover Dash is an independent, nonpartisan project of Civic Delaware.<br>' +
      '<a href="mailto:info@civicdelaware.com">info@civicdelaware.com</a></div>' +
    '<div class="foot-line" style="margin-top:4px;">&copy; 2026 Civic Delaware. All rights reserved.</div>' +
  '</div>';
}

/* ── ACTIONS ── */
function pick(key) {
  st.profile = key;
  render();
  gtag("event","profile_selected",{profile:key});
  // Fire-and-forget click counter — never blocks UI
  fetch(FN_TRACK, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({profile:key})
  }).catch(function(){});
}

function goForecast() {
  if (!st.profile) return;
  var bills = getBillsForProfile(st.profile);
  var hasWO = bills.some(function(b){ return b.direction==="Watch Out"; });
  st.screen = "forecast";
  st.filter = hasWO ? "watchout" : "helps";
  st.expanded = {};
  render();
  gtag("event","forecast_view",{profile:st.profile,bill_count:bills.length});
}

function goIntro()    { st.screen = "intro"; render(); }
function setFilter(f) { st.filter = f; render(); gtag("event","filter_changed",{filter:f,profile:st.profile}); }
function toggle(id)   { st.expanded[id] = !st.expanded[id]; render(); gtag("event","bill_expanded",{bill:id}); }

function doInlineSub(billId) {
  var emailEl = document.getElementById("ic-email-"+billId);
  var email   = emailEl ? emailEl.value.trim() : "";
  if (!email || email.indexOf("@")<0) { if (emailEl) emailEl.focus(); return; }
  fetch(FN_SUBSCRIBE, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email,profile:st.profile||"unknown"}),
  }).catch(function(){});
  st.capDone[billId] = true;
  render();
  gtag("event","email_subscribed",{profile:st.profile,source:"inline"});
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── BOOT ── */
render();

})();
</script>

</body>
</html>
