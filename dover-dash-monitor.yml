name: Dover Dash Bill Monitor v7

on:
  schedule:
    # 6:00 AM Eastern (10:00 UTC) — morning brief
    - cron: '0 10 * * *'
    # 2:00 PM Eastern (18:00 UTC) — afternoon check during session
    - cron: '0 18 * * *'
  # Run manually anytime from the Actions tab
  workflow_dispatch:

# Required to commit bill_states.json + pending_report.json back to the repo
permissions:
  contents: write

jobs:
  check-bills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Dover Dash Monitor
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          MAILCHIMP_API_KEY:  ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID:  ${{ secrets.MAILCHIMP_LIST_ID }}
          MAILCHIMP_SERVER:   ${{ secrets.MAILCHIMP_SERVER }}
          AIRTABLE_API_KEY:   ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID:   app0BjytshiU6sQ3g
          AIRTABLE_TABLE_ID:  tblqoDpzOKl6Gq8WA
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      # Commit state files back to repo so next run knows what we've already seen
      - name: Save state
        run: |
          git config user.name  "Dover Dash Monitor"
          git config user.email "monitor@civicdelaware.com"
          git add bill_states.json
          git add pending_report.json || true
          git diff --staged --quiet || git commit -m "Update bill state [skip ci]"
          git pull --rebase origin main
          git push
