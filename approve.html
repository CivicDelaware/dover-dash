<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dover Dash - Review &amp; Approve Email</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700;800&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#F5F3EF;font-family:'Source Sans 3',system-ui,sans-serif;min-height:100vh}

    .hdr{background:#002868;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
    .hdr-title{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:900}
    .hdr-title .w{color:#fff}
    .hdr-title .g{color:#BAFF5C;font-style:italic}
    .hdr-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
    .dbadge{font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;background:#FFFDE7;color:#002868}
    .dbadge.sent{background:#D1FAE5;color:#065F46}

    .layout{display:grid;grid-template-columns:1fr 440px;min-height:calc(100vh - 50px)}
    .ecol{padding:20px;overflow-y:auto;border-right:1px solid #E5E7EB;background:#F5F3EF}
    .pcol{background:#D8D5CF;padding:18px;overflow-y:auto;position:sticky;top:50px;height:calc(100vh - 50px)}

    .arow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .btn{border:none;border-radius:8px;padding:11px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;gap:7px}
    .bsend{background:#1A7A4A;color:#fff}
    .bsend:hover:not(:disabled){background:#156040}
    .bdis{background:#fff;color:#8B1A1A;border:1.5px solid #D93B3B}
    .bdis:hover:not(:disabled){background:#FDECEA}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    .notice{background:#FFFDE7;border:1.5px solid #E5D65E;border-radius:10px;padding:13px 17px;margin-bottom:16px}
    .notice-t{font-size:12px;font-weight:800;color:#002868;margin-bottom:3px}
    .notice-s{font-size:11px;color:#374151;line-height:1.5}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
    .chip{font-size:10px;font-weight:700;background:#fff;border:1.5px solid #E5E7EB;border-radius:6px;padding:3px 9px;color:#374151}

    .scard{background:#fff;border-radius:10px;border:1.5px solid #E5E7EB;margin-bottom:14px;overflow:hidden}
    .scard-h{padding:10px 15px;border-bottom:1px solid #F0F0EE;background:#FAFAF8;font-size:10px;font-weight:800;color:#6B7280;letter-spacing:1px;text-transform:uppercase}
    .scard-b{padding:14px 16px}
    input.subj{width:100%;border:1.5px solid #E5E7EB;border-radius:7px;padding:10px 13px;font-size:13px;font-weight:700;font-family:'Source Sans 3',sans-serif;color:#111827;outline:none}
    input.subj:focus{border-color:#002868;box-shadow:0 0 0 2px rgba(0,40,104,.1)}

    .bc{background:#fff;border-radius:10px;border:1.5px solid #E5E7EB;margin-bottom:14px;overflow:hidden}
    .bc-hdr{padding:12px 15px 10px;border-bottom:1px solid #F0F0EE;background:#FAFAF8;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .bc-name{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:#111827;line-height:1.2}
    .bc-meta{font-size:10px;color:#6B7280;margin-top:3px}
    .bc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
    .ptag{font-size:9px;font-weight:700;background:#EEF2FF;color:#3730A3;border-radius:4px;padding:2px 7px}
    .stag{font-size:9px;font-weight:700;background:#F5F3EF;color:#374151;border-radius:4px;padding:2px 7px;border:1px solid #E5E7EB}
    .bh{background:#F0FDE4;color:#1A7A4A;font-size:9px;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap}
    .bw{background:#FDECEA;color:#D93B3B;font-size:9px;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap}
    .bneu{background:#F3F4F6;color:#6B7280;font-size:9px;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap}
    .bc-body{padding:14px 16px}
    .flbl{font-size:10px;font-weight:800;color:#9CA3AF;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
    .flbl:first-child{margin-top:0}
    textarea.ef{width:100%;border:1.5px solid #E5E7EB;border-radius:7px;padding:9px 12px;font-size:12px;font-family:'Source Sans 3',sans-serif;color:#111827;outline:none;resize:vertical;line-height:1.55}
    textarea.ef:focus{border-color:#002868;box-shadow:0 0 0 2px rgba(0,40,104,.1)}
    .ef.hl{min-height:52px;font-weight:600}
    .ef.sm{min-height:88px}
    .ef.ns{min-height:40px;font-size:11px}
    .rmb{background:none;border:none;color:#D93B3B;font-size:20px;cursor:pointer;padding:0 3px;line-height:1;flex-shrink:0}
    .rmb:hover{color:#8B1A1A}
    .removed-note{font-size:10px;font-weight:700;color:#D93B3B;margin-top:4px}

    .plbl{font-size:10px;font-weight:800;color:#6B7280;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;text-align:center}
    .phone{background:#1C1C1E;border-radius:24px;padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .ifw{background:#fff;border-radius:16px;overflow:hidden}
    iframe#pf{width:100%;border:none;height:570px;display:block}

    .ldg{text-align:center;padding:60px 20px}
    .spin{width:28px;height:28px;border:3px solid #E5E7EB;border-top-color:#002868;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:60px 20px}
    .empty-icon{font-size:36px;margin-bottom:10px}
    .empty-t{font-size:15px;font-weight:700;color:#111827;margin-bottom:5px}
    .empty-s{font-size:12px;color:#6B7280}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .toast.green{background:#1A7A4A}
    .toast.red{background:#D93B3B}

    @media(max-width:860px){.layout{grid-template-columns:1fr}.pcol{display:none}}
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title"><span class="w">Dover </span><span class="g">Dash</span></div>
    <div class="hdr-sub">Email Review &amp; Approval</div>
  </div>
  <div class="dbadge" id="dbadge">Loading...</div>
</div>

<div class="layout">

  <div class="ecol">
    <div class="ldg" id="ldg"><div class="spin"></div>Loading draft...</div>
    <div class="empty" id="emp" style="display:none">
      <div class="empty-icon" id="ei">&#128235;</div>
      <div class="empty-t" id="et">No pending report</div>
      <div class="empty-s" id="es">Run the monitor from GitHub Actions or wait for the 6AM report.</div>
    </div>
    <div id="edbody" style="display:none"></div>
  </div>

  <div class="pcol">
    <div class="plbl">Live Preview</div>
    <div class="phone">
      <div class="ifw">
        <iframe id="pf" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px">
      <button onclick="doPrev()" style="background:none;border:1.5px solid #6B7280;color:#374151;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif">Refresh Preview</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var FN_GET  = "/.netlify/functions/get-report";
var FN_MARK = "/.netlify/functions/mark-report";

// Short display labels for persona IDs
var PERSONA_LABELS = {
  "homeowner": "Home Owner",
  "renter":    "Renter",
  "senior":    "Retiree / Fixed Income",
  "smallbiz":  "Small Business Owner",
  "pubsec":    "Public Sector Employee",
  "workpro":   "Private Sector Worker (Full-Time)",
  "lowwage":   "Low-Wage / Service Worker",
};

var report = null;
var bills  = [];
var prevTimer = null;

function g(id){ return document.getElementById(id); }

function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function showBadge(txt, cls){
  var b = g("dbadge");
  b.textContent = txt;
  b.className = "dbadge" + (cls ? " "+cls : "");
}

function showEmpty(title, sub){
  g("ldg").style.display   = "none";
  g("edbody").style.display = "none";
  g("et").textContent = title;
  g("es").textContent = sub;
  g("emp").style.display = "block";
}

function showToast(msg, type){
  var t = g("toast");
  t.textContent = msg;
  t.className = "toast show" + (type ? " "+type : "");
  clearTimeout(t._tm);
  t._tm = setTimeout(function(){ t.className = "toast"; }, 3200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  try {
    var res = await fetch(FN_GET);
    if (!res.ok){ showEmpty("Could not load report", "Server error — try refreshing."); return; }
    var payload = await res.json();
    if (!payload.found){ showEmpty("No pending report", "Run the monitor or wait for the 6AM report."); return; }
    var d = payload.report;
    if (!d){ showEmpty("Empty report", ""); return; }
    if (d.status === "sent"){
      showEmpty("Already sent", "Today's report went out to subscribers.");
      showBadge("Sent", "sent"); return;
    }
    if (d.status === "discarded"){
      showEmpty("Discarded", "No email was sent today."); return;
    }
    report = d;
    bills  = buildBillsFromAlerts(d.alerts || []);
    renderEditor(d);
    var when = d.generated
      ? new Date(d.generated + "T12:00:00").toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"})
      : "Pending";
    showBadge("Draft - " + when, "");
    g("ldg").style.display    = "none";
    g("edbody").style.display = "block";
    setTimeout(doPrev, 400);
  } catch(e){
    showEmpty("Load error", e.message);
  }
}

// ── BUILD BILLS FROM ALERTS ───────────────────────────────────────────────────
function buildBillsFromAlerts(alerts){
  return alerts.map(function(a, i){
    return {
      i:           i,
      bill_code:   a.bill_code || "",
      short_title: a.short_title || "",
      long_title:  a.long_title || "",
      synopsis:    a.synopsis || "",
      direction:   a.direction || null,
      stage:       a.stage || "",
      stage_label: a.stage_label || a.stage || "",
      stage_emoji: a.stage_emoji || "",
      committee:   a.committee || null,
      personas:    a.personas || [],
      sponsor:     a.sponsor || "",
      chamber:     a.chamber || "",
      bill_url:    a.bill_url || "",
      headline:    buildHeadline(a),
      nextstep:    buildNextStep(a),
      summary:     truncate(a.synopsis || a.long_title || "", 220),
      removed:     false,
    };
  });
}

function buildHeadline(a){
  if (a.short_title) return a.bill_code + ": " + a.short_title;
  if (a.long_title)  return a.bill_code + ": " + truncate(a.long_title.replace(/^AN ACT TO /i,""), 80);
  return a.bill_code;
}

function buildNextStep(a){
  if (a.stage === "ready_list")
    return "A floor vote could happen any day. This is the last step before the full chamber votes.";
  if (a.stage === "in_committee")
    return "Now being reviewed by the " + (a.committee || "committee") + ". The committee will decide whether it moves to a full vote.";
  if (a.stage === "introduced")
    return "Just introduced. It has been assigned a number and a sponsor, but no committee vote has happened yet.";
  if (a.stage === "passed_chamber")
    return "Passed one chamber and moves to the other. One more vote before it can go to the Governor.";
  if (a.stage === "governor")
    return "Sent to the Governor and could be signed into law soon.";
  return a.stage_label || "";
}

function truncate(s, n){
  s = String(s || "");
  if (s.length <= n) return s;
  return s.slice(0, n).replace(/\s+\S*$/, "") + "...";
}

function autoSubject(d){
  var alerts = d.alerts || [];
  var ready  = alerts.filter(function(a){ return a.stage === "ready_list"; }).length;
  var comm   = alerts.filter(function(a){ return a.stage === "in_committee"; }).length;
  var intro  = alerts.filter(function(a){ return a.stage === "introduced"; }).length;
  var parts  = [];
  if (ready) parts.push(ready + " bill" + (ready>1?"s":"") + " headed to a floor vote");
  if (comm)  parts.push(comm  + " in committee");
  if (intro) parts.push(intro + " newly introduced");
  if (!parts.length) parts.push((alerts.length) + " legislative update" + (alerts.length>1?"s":""));
  return "Delaware Watch -- " + parts.join(", ") + " [" + (d.generated || "") + "]";
}

// ── RENDER EDITOR ─────────────────────────────────────────────────────────────
function renderEditor(d){
  var alerts = d.alerts || [];
  var ready  = alerts.filter(function(a){ return a.stage === "ready_list"; }).length;
  var comm   = alerts.filter(function(a){ return a.stage === "in_committee"; }).length;
  var intro  = alerts.filter(function(a){ return a.stage === "introduced"; }).length;
  var chipArr = [];
  if (ready) chipArr.push('<span class="chip">&#128680; Ready List: '+ready+'</span>');
  if (comm)  chipArr.push('<span class="chip">&#127963; In Committee: '+comm+'</span>');
  if (intro) chipArr.push('<span class="chip">&#128203; New Bills: '+intro+'</span>');
  var chipsHtml = chipArr.length ? '<div class="chips">'+chipArr.join("")+'</div>' : "";

  g("edbody").innerHTML =
    '<div class="notice">'+
      '<div class="notice-t">Review and copy below</div>'+
      '<div class="notice-s">Edit any field or remove bills you don\'t want. Then copy the HTML and paste it into your Mailchimp campaign. Click Mark as Done after you\'ve sent it.</div>'+
      chipsHtml+
    '</div>'+
    '<div class="arow">'+
      '<button class="btn bsend" id="bcopy" onclick="doCopy()">&#128203; Copy Email HTML</button>'+
      '<button class="btn" style="background:#fff;color:#002868;border:1.5px solid #002868" onclick="doDownload()">&#8615; Download HTML</button>'+
      '<button class="btn" style="background:#fff;color:#1A7A4A;border:1.5px solid #1A7A4A" onclick="doMarkDone()">&#10003; Mark as Done</button>'+
      '<button class="btn bdis" onclick="doDiscard()">Discard</button>'+
    '</div>'+
    '<div class="scard">'+
      '<div class="scard-h">Subject Line</div>'+
      '<div class="scard-b">'+
        '<input class="subj" id="fsubj" value="'+esc(autoSubject(d))+'" oninput="schedPrev()">'+
      '</div>'+
    '</div>'+
    '<div id="blist"></div>';

  renderBillList();
}

function renderBillList(){
  var c = g("blist");
  if (!bills.length){
    c.innerHTML = '<div style="text-align:center;padding:20px;color:#6B7280;font-size:12px">No bill alerts found in this report.</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < bills.length; i++){
    var b  = bills[i];
    var bc = b.direction === "Helps You" ? "bh" : b.direction === "Watch Out" ? "bw" : "bneu";
    var dirLabel = b.direction || "Not Classified";
    var op  = b.removed ? 'style="opacity:.35;pointer-events:none"' : '';
    var rmn = b.removed ? '<div class="removed-note">Removed from email</div>' : '';
    var pTagsHtml = b.personas.map(function(p){
      return '<span class="ptag">'+esc(PERSONA_LABELS[p]||p)+'</span>';
    }).join("");
    var stageStr = b.stage_emoji + " " + b.stage_label;
    if (b.committee) stageStr += ": " + b.committee;
    var stageTag = '<span class="stag">'+esc(stageStr)+'</span>';
    html +=
      '<div class="bc" id="bc'+i+'" '+op+'>'+
        '<div class="bc-hdr">'+
          '<div style="flex:1;min-width:0">'+
            '<div class="bc-name">'+esc(b.bill_code)+'</div>'+
            '<div class="bc-meta">'+esc(b.sponsor ? b.chamber+' - Sponsor: '+b.sponsor : b.chamber)+'</div>'+
            '<div class="bc-tags">'+stageTag+pTagsHtml+'</div>'+
            rmn+
          '</div>'+
          '<div style="display:flex;align-items:flex-start;gap:8px;flex-shrink:0;margin-top:2px">'+
            '<span class="'+bc+'">'+esc(dirLabel)+'</span>'+
            '<button class="rmb" title="Remove from email" onclick="removeBill('+i+')">&times;</button>'+
          '</div>'+
        '</div>'+
        '<div class="bc-body">'+
          '<div class="flbl">Headline</div>'+
          '<textarea class="ef hl" id="hl'+i+'" oninput="schedPrev()">'+esc(b.headline)+'</textarea>'+
          '<div class="flbl">Next Step / Status Note</div>'+
          '<textarea class="ef ns" id="ns'+i+'" oninput="schedPrev()">'+esc(b.nextstep)+'</textarea>'+
          '<div class="flbl">Summary (plain English -- edit the Claude draft here)</div>'+
          '<textarea class="ef sm" id="sm'+i+'" oninput="schedPrev()">'+esc(b.summary)+'</textarea>'+
        '</div>'+
      '</div>';
  }
  c.innerHTML = html;
}

// ── REMOVE BILL ───────────────────────────────────────────────────────────────
function removeBill(i){
  bills[i].removed = true;
  var card = g("bc"+i);
  if (card){
    card.style.opacity = ".35";
    card.style.pointerEvents = "none";
    var hdr = card.querySelector(".bc-hdr");
    if (hdr && !hdr.querySelector(".removed-note"))
      hdr.insertAdjacentHTML("beforeend", '<div class="removed-note">Removed from email</div>');
  }
  schedPrev();
  showToast("Bill removed from email", "");
}

// ── BUILD EMAIL HTML ──────────────────────────────────────────────────────────
function buildHtml(){
  if (!report) return "";
  var subj = ((g("fsubj")||{}).value||"").trim();
  var today = report.generated
    ? new Date(report.generated + "T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})
    : new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

  var cardsHtml = "";
  var anyIncluded = false;
  for (var i = 0; i < bills.length; i++){
    var b = bills[i];
    if (b.removed) continue;
    anyIncluded = true;
    var hl  = ((g("hl"+i)||{}).value  || b.headline).trim();
    var ns  = ((g("ns"+i)||{}).value  || b.nextstep).trim();
    var sm  = ((g("sm"+i)||{}).value  || b.summary ).trim();

    var dirColor = b.direction === "Watch Out" ? "#D93B3B" : b.direction === "Helps You" ? "#1A7A4A" : "#6B7280";
    var dirBg    = b.direction === "Watch Out" ? "#FDECEA" : b.direction === "Helps You" ? "#F0FDE4" : "#F3F4F6";
    var dirLabel = b.direction || "Update";
    var stageStr = b.stage_emoji + " " + b.stage_label;
    if (b.committee) stageStr += ": " + b.committee;
    var personaStr = b.personas.map(function(p){ return PERSONA_LABELS[p]||p; }).join(" - ");

    cardsHtml +=
      '<tr><td style="padding:0 0 4px 0">'+
      '<table width="100%" cellpadding="0" cellspacing="0" style="border-left:4px solid '+dirColor+';background:#fff">'+
      '<tr><td style="padding:18px 22px 20px">'+
        '<div>'+
          '<span style="background:'+dirBg+';color:'+dirColor+';font-size:9px;font-weight:700;border-radius:4px;padding:2px 8px;text-transform:uppercase;letter-spacing:0.5px;font-family:Arial,sans-serif">'+htmlEsc(dirLabel)+'</span>'+
          '<span style="font-size:9px;color:#9CA3AF;margin-left:8px;font-family:Arial,sans-serif">'+htmlEsc(stageStr)+'</span>'+
        '</div>'+
        '<div style="font-family:Georgia,serif;font-size:18px;font-weight:700;color:#111827;margin:10px 0 5px;line-height:1.3">'+htmlEsc(hl)+'</div>'+
        '<div style="font-size:10px;color:#6B7280;font-family:Arial,sans-serif;margin-bottom:12px">'+
          htmlEsc(b.bill_code)+(b.sponsor ? ' &nbsp;&#183;&nbsp; Sponsor: '+htmlEsc(b.sponsor) : '')+(b.chamber ? ' &nbsp;&#183;&nbsp; '+htmlEsc(b.chamber) : '')+
        '</div>'+
        (ns ? '<div style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.8px;font-family:Arial,sans-serif;margin-bottom:4px">NEXT STEP</div>'+
              '<div style="font-size:12px;font-weight:700;color:#374151;font-family:Arial,sans-serif;margin-bottom:12px;line-height:1.5">'+htmlEsc(ns)+'</div>' : '')+
        (sm ? '<div style="font-size:13px;color:#374151;font-family:Arial,sans-serif;line-height:1.65;margin-bottom:12px">'+htmlEsc(sm)+'</div>' : '')+
        (personaStr ? '<div style="font-size:10px;color:#9CA3AF;font-family:Arial,sans-serif;margin-bottom:10px">Affects: '+htmlEsc(personaStr)+'</div>' : '')+
        (b.bill_url ? '<a href="'+htmlEsc(b.bill_url)+'" style="font-size:11px;font-weight:700;color:#002868;font-family:Arial,sans-serif;text-decoration:none">Read the full bill on legis.delaware.gov &#8594;</a>' : '')+
      '</td></tr>'+
      '</table>'+
      '</td></tr>';
  }

  if (!anyIncluded) return "";

  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>'+htmlEsc(subj)+'</title></head>'+
  '<body style="margin:0;padding:0;background:#F5F3EF;font-family:Arial,Helvetica,sans-serif">'+
  '<table width="100%" cellpadding="0" cellspacing="0" style="background:#F5F3EF">'+
  '<tr><td align="center" style="padding:24px 10px">'+
  '<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%">'+
    '<tr><td style="background:#002868;padding:22px 26px;border-radius:8px 8px 0 0">'+

function htmlEsc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── PREVIEW ───────────────────────────────────────────────────────────────────
function schedPrev(){ clearTimeout(prevTimer); prevTimer = setTimeout(doPrev, 600); }
function doPrev(){
  var frame = g("pf");
  if (!frame) return;
  var html = buildHtml();
  if (!html) return;
  var fd = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
  if (!fd) return;
  fd.open(); fd.write(html); fd.close();
  setTimeout(function(){ try{ frame.style.height = (fd.body.scrollHeight + 30)+"px"; }catch(e){} }, 400);
}

// ── COPY HTML ─────────────────────────────────────────────────────────────────
async function doCopy(){
  var html = buildHtml();
  if (!html){ showToast("No bills to copy -- all were removed.", "red"); return; }
  try {
    await navigator.clipboard.writeText(html);
    showToast("HTML copied! Paste it into your Mailchimp campaign.", "green");
  } catch(e){
    // Fallback for older browsers
    var ta = document.createElement("textarea");
    ta.value = html;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("HTML copied! Paste it into your Mailchimp campaign.", "green");
  }
}

// ── DOWNLOAD HTML ─────────────────────────────────────────────────────────────
function doDownload(){
  var html = buildHtml();
  if (!html){ showToast("No bills to download -- all were removed.", "red"); return; }
  var date = (report && report.generated) ? report.generated : new Date().toISOString().slice(0,10);
  var blob = new Blob([html], {type:"text/html"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href = url; a.download = "dover-dash-" + date + ".html";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Downloaded: dover-dash-" + date + ".html", "");
}

// ── MARK AS DONE ──────────────────────────────────────────────────────────────
async function doMarkDone(){
  if (!confirm("Mark this report as done? It will clear from the queue.")) return;
  await markAs("sent");
  showToast("Marked as done.", "green");
  showBadge("Done", "sent");
  setTimeout(function(){ showEmpty("All done", "This report has been cleared. Check back after the next monitor run."); }, 1200);
}

// ── DISCARD ───────────────────────────────────────────────────────────────────
async function doDiscard(){
  if (!confirm("Discard this report? It will be cleared without sending.")) return;
  await markAs("discarded");
  showToast("Report discarded", "");
  setTimeout(function(){ showEmpty("Discarded", "No email was sent today."); }, 1000);
}

async function markAs(status){
  try {
    await fetch(FN_MARK, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ status:status })
    });
  } catch(e){ console.warn(e); }
}
